<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交易日誌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #141a23;
      --surface-2: #1c2431;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text: #edf2f7;
      --muted: #8a94a6;
      --win: #13c784;
      --win-bg: rgba(19, 199, 132, 0.12);
      --loss: #ff6678;
      --loss-bg: rgba(255, 102, 120, 0.12);
      --accent: #4f7cff;
      --accent-soft: rgba(79, 124, 255, 0.12);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --sans: "Noto Sans TC", sans-serif;
      --mono: "Space Mono", monospace;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.5; }
    body { margin: 0; min-height: 100vh; background:
      radial-gradient(circle at top left, rgba(79, 124, 255, 0.12), transparent 28%),
      radial-gradient(circle at top right, rgba(19, 199, 132, 0.10), transparent 22%),
      var(--bg);
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .shell {
      width: min(1180px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .logo {
      font: 700 13px var(--mono);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .logo span { color: var(--accent); }
    .headline { font-size: clamp(24px, 4vw, 34px); font-weight: 700; letter-spacing: -0.03em; }
    .subhead { color: var(--muted); font-size: 14px; }

    .sync-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      white-space: nowrap;
      font: 700 11px var(--mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sync-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .sync-dot.ok { background: var(--win); }
    .sync-dot.err { background: var(--loss); }
    .sync-dot.loading { background: var(--accent); animation: pulse 1.1s infinite; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.8); opacity: 0.35; }
    }

    .panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .tabs {
      display: inline-flex;
      gap: 6px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px;
    }

    .tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      transition: 0.18s ease;
    }

    .tab.active {
      background: var(--surface-2);
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      transition: 0.18s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.1; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-strong);
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn[disabled] { opacity: 0.55; cursor: not-allowed; transform: none; }

    .stats {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .stat-label {
      font-size: 11px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
